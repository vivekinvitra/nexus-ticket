<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1e40af"/>
  <!-- Ticket body -->
  <rect x="4" y="10" width="24" height="12" rx="2" fill="white"/>
  <!-- Left notch -->
  <circle cx="4" cy="16" r="2.5" fill="#1e40af"/>
  <!-- Right notch -->
  <circle cx="28" cy="16" r="2.5" fill="#1e40af"/>
  <!-- Perforation line -->
  <line x1="13" y1="11" x2="13" y2="21" stroke="#1e40af" stroke-width="1.2" stroke-dasharray="2,1.5"/>
  <!-- Star / seat mark -->
  <circle cx="20" cy="16" r="3" fill="#1e40af" opacity="0.15"/>
  <text x="19" y="19.5" font-size="6" font-family="sans-serif" font-weight="bold" fill="#1e40af">★</text>
</svg>
