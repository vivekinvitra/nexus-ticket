<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2f4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pitchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5c2a;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0e3d1a;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="brightonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005daa" />
      <stop offset="100%" style="stop-color:#003d7a" />
    </linearGradient>
    <linearGradient id="liverpoolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8102e" />
      <stop offset="100%" style="stop-color:#8b0a1f" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Pitch overlay -->
  <ellipse cx="600" cy="480" rx="700" ry="300" fill="url(#pitchGrad)" opacity="0.4"/>

  <!-- Pitch lines -->
  <circle cx="600" cy="400" r="120" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.12"/>
  <line x1="600" y1="200" x2="600" y2="630" stroke="#ffffff" stroke-width="1.5" opacity="0.12"/>
  <rect x="200" y="340" width="200" height="130" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.12" rx="2"/>
  <rect x="800" y="340" width="200" height="130" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.12" rx="2"/>

  <!-- EPL Badge top -->
  <rect x="530" y="30" width="140" height="36" rx="18" fill="#3d195b" opacity="0.9"/>
  <text x="600" y="54" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">PREMIER LEAGUE</text>

  <!-- Brighton block -->
  <rect x="60" y="100" width="440" height="380" rx="16" fill="url(#brightonGrad)" opacity="0.15"/>
  <rect x="60" y="100" width="440" height="380" rx="16" fill="none" stroke="#005daa" stroke-width="1.5" opacity="0.4"/>

  <!-- Brighton stripes -->
  <rect x="200" y="130" width="40" height="160" rx="6" fill="#005daa" opacity="0.7"/>
  <rect x="250" y="130" width="40" height="160" rx="6" fill="#ffffff" opacity="0.7"/>
  <rect x="300" y="130" width="40" height="160" rx="6" fill="#005daa" opacity="0.7"/>

  <!-- Brighton name -->
  <text x="280" y="340" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">BRIGHTON</text>
  <text x="280" y="372" font-family="Arial, sans-serif" font-size="14" fill="#7ab8f5" text-anchor="middle" letter-spacing="2">HOVE ALBION</text>
  <text x="280" y="410" font-family="Arial, sans-serif" font-size="13" fill="#aac8e8" text-anchor="middle">Amex Stadium</text>
  <text x="280" y="432" font-family="Arial, sans-serif" font-size="13" fill="#aac8e8" text-anchor="middle">Brighton, England</text>

  <!-- VS divider -->
  <circle cx="600" cy="295" r="52" fill="#0a1628" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
  <text x="600" y="307" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="#ffffff" text-anchor="middle">VS</text>

  <!-- Liverpool block -->
  <rect x="700" y="100" width="440" height="380" rx="16" fill="url(#liverpoolGrad)" opacity="0.15"/>
  <rect x="700" y="100" width="440" height="380" rx="16" fill="none" stroke="#c8102e" stroke-width="1.5" opacity="0.4"/>

  <!-- Liverpool crest simplified -->
  <ellipse cx="920" cy="200" rx="55" ry="65" fill="#c8102e" opacity="0.7"/>
  <text x="920" y="195" font-family="Arial, sans-serif" font-size="36" text-anchor="middle">⚽</text>
  <text x="920" y="225" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">LFC</text>

  <!-- Liverpool name -->
  <text x="920" y="340" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">LIVERPOOL</text>
  <text x="920" y="372" font-family="Arial, sans-serif" font-size="14" fill="#f5a0a0" text-anchor="middle" letter-spacing="2">FOOTBALL CLUB</text>

  <!-- Match info bar -->
  <rect x="0" y="530" width="1200" height="100" fill="#000000" opacity="0.55"/>
  <line x1="0" y1="530" x2="1200" y2="530" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

  <!-- Date / time / venue -->
  <text x="600" y="567" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffd700" text-anchor="middle" letter-spacing="1">SATURDAY · 21 MARCH 2026 · 12:30</text>
  <text x="600" y="598" font-family="Arial, sans-serif" font-size="14" fill="#c0d0e0" text-anchor="middle" letter-spacing="1">AMEX STADIUM · BRIGHTON · ENGLAND</text>
  <text x="600" y="620" font-family="Arial, sans-serif" font-size="11" fill="#7090a8" text-anchor="middle" letter-spacing="2">ENGLISH PREMIER LEAGUE 2026</text>
</svg>
